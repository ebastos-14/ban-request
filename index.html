<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Twitch Vote Overlay</title>

<style>

body {
    margin: 0;
    background: transparent;
    font-family: Arial;
    overflow: hidden;
    color: white;
}

/* CONTENEDOR */
.container {
    width: 100vw;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

/* TIMER */
#timer {
    font-size: 60px;
    font-weight: bold;
    margin-bottom: 20px;
}

/* BALANZA */
.balance-wrapper {
    width: 340px;
    height: 240px;
    position: relative;
}

.balance {
    width: 100%;
    height: 10px;
    background: white;
    position: absolute;
    top: 50%;
    transform-origin: center;
    transition: transform 0.4s ease, background 0.4s ease;
}

.pan {
    position: absolute;
    width: 120px;
    height: 120px;
    border-radius: 50%;
    background: rgba(255,255,255,0.15);
    top: 50%;
    transform: translateY(-50%);
}

.left { left: 0; }
.right { right: 0; }

/* VOTOS */
#votes {
    margin-top: 15px;
    font-size: 26px;
    font-weight: bold;
}

/* TARGET */
#target {
    margin-top: 15px;
    font-size: 30px;
    opacity: 0.9;
}

</style>
</head>

<body>

<div class="container">

    <div id="timer">60</div>

    <div class="balance-wrapper">

        <div id="balance" class="balance"></div>

        <div class="pan left"></div>
        <div class="pan right"></div>

    </div>

    <div id="votes">0 vs 0</div>

    <div id="target">@---</div>

</div>

<script>

/*
|--------------------------------------------------------------------------
| CHANNEL DINÁMICO
|--------------------------------------------------------------------------
*/

const urlParams = new URLSearchParams(window.location.search);
const channel = urlParams.get("channel") || "ebastos14_";

/*
|--------------------------------------------------------------------------
| UPDATE LOOP
|--------------------------------------------------------------------------
*/

async function updateOverlay() {

    try {

        const res = await fetch(`/event?channel=${channel}`);
        const data = await res.json();

        if (!data.activeVote) return;

        const vote = data.activeVote;

        const yes = vote.yesVotes.length;
        const no = vote.noVotes.length;
        const total = yes + no;

        /*
        |--------------------------------------------------------------------------
        | TIMER (SYNC BACKEND)
        |--------------------------------------------------------------------------
        */

        const remaining = Math.max(
            0,
            Math.ceil((vote.endsAt - Date.now()) / 1000)
        );

        document.getElementById("timer").innerText = remaining;

        /*
        |--------------------------------------------------------------------------
        | VOTES DISPLAY
        |--------------------------------------------------------------------------
        */

        document.getElementById("votes").innerText =
            `${yes} SI vs ${no} NO`;

        /*
        |--------------------------------------------------------------------------
        | TARGET
        |--------------------------------------------------------------------------
        */

        document.getElementById("target").innerText =
            `@${vote.target}`;

        /*
        |--------------------------------------------------------------------------
        | BALANCE ROTATION
        |--------------------------------------------------------------------------
        */

        const balance = document.getElementById("balance");

        let tilt = 0;

        if (total > 0) {
            tilt = (yes - no) / total;
        }

        balance.style.transform =
            `rotate(${tilt * 28}deg)`;

        /*
        |--------------------------------------------------------------------------
        | COLOR SYSTEM
        |--------------------------------------------------------------------------
        */

        if (yes === no) {

            balance.style.background = "white";

        } else if (yes > no) {

            const intensity = yes / total;

            balance.style.background =
                `rgb(255, ${255 - intensity * 210}, ${255 - intensity * 210})`;

        } else {

            const intensity = no / total;

            balance.style.background =
                `rgb(${255 - intensity * 210}, ${255 - intensity * 210}, 255)`;

        }

    } catch (err) {

        console.error("Overlay error:", err);

    }

}

/*
|--------------------------------------------------------------------------
| LOOP
|--------------------------------------------------------------------------
*/

setInterval(updateOverlay, 1000);
updateOverlay();

</script>

</body>
</html>
